name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npx electron-builder --win nsis --publish never
        env:
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""

      - name: List dist
        run: dir dist
        shell: cmd

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: win-v0.1.0
          name: Capi Windows Installer v0.1.0
          files: dist/*.exe
          fail_on_unmatched_files: true
