<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --ink: #1e1b2e;
        --purple: #7c5cff;
        --purple-deep: #5b3fd6;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-user-select: none;
        user-select: none;
        cursor: default;
      }
      /* o card vive numa margem pra a sombra não cortar */
      #wrap { padding: 12px 14px; }
      #card {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 14px 14px 0;
        border-radius: 16px;
        background: rgba(30, 27, 46, 0.86);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 12px 34px rgba(10, 8, 20, 0.5);
        overflow: hidden;
        transform: translateX(120%);
        opacity: 0;
        transition: transform 0.32s cubic-bezier(0.16, 0.84, 0.28, 1), opacity 0.32s ease;
      }
      #card.in { transform: translateX(0); opacity: 1; }
      #card.out { transform: translateX(120%); opacity: 0; }

      .row { display: flex; align-items: center; gap: 11px; }
      #avatar {
        width: 40px; height: 40px; flex: 0 0 40px;
        border-radius: 11px;
        background: #fff center/cover no-repeat;
        border: 1px solid rgba(255, 255, 255, 0.12);
        object-fit: cover;
      }
      .meta { flex: 1 1 auto; min-width: 0; }
      #from {
        font-size: 14px; font-weight: 700; color: #fff;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      #tag { font-size: 11.5px; color: rgba(255,255,255,0.55); margin-top: 1px; }
      #close {
        flex: 0 0 auto; width: 24px; height: 24px;
        display: grid; place-items: center;
        border-radius: 8px; color: rgba(255,255,255,0.6);
        font-size: 15px; line-height: 1;
        transition: background 0.15s, color 0.15s;
      }
      #close:hover { background: rgba(255,255,255,0.12); color: #fff; }

      #body {
        font-size: 13px; line-height: 1.42; color: rgba(255,255,255,0.86);
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        overflow: hidden;
      }

      #actions { display: flex; gap: 8px; padding-bottom: 12px; }
      .btn {
        flex: 1 1 0; height: 34px;
        display: grid; place-items: center;
        border-radius: 10px; font-size: 13px; font-weight: 650;
        transition: filter 0.15s, background 0.15s, transform 0.05s;
      }
      .btn:active { transform: translateY(1px); }
      #reply {
        background: linear-gradient(180deg, var(--purple), var(--purple-deep));
        color: #fff; flex: 2 1 0;
      }
      #reply:hover { filter: brightness(1.08); }
      #dismiss {
        background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85);
      }
      #dismiss:hover { background: rgba(255,255,255,0.14); }

      /* barra de tempo até sumir */
      #barTrack {
        position: absolute; left: 0; right: 0; bottom: 0; height: 3px;
        background: rgba(255,255,255,0.08);
      }
      #bar {
        height: 100%; width: 100%;
        background: linear-gradient(90deg, var(--purple), #a78bff);
        transform-origin: left center;
        will-change: transform;
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div id="card">
        <div class="row">
          <img id="avatar" alt="" />
          <div class="meta">
            <div id="from">Agente</div>
            <div id="tag">respondeu você</div>
          </div>
          <div id="close" title="Dispensar">✕</div>
        </div>
        <div id="body"></div>
        <div id="actions">
          <div id="reply" class="btn">Responder</div>
          <div id="dismiss" class="btn">Dispensar</div>
        </div>
        <div id="barTrack"><div id="bar"></div></div>
      </div>
    </div>
    <script src="notif.js"></script>
  </body>
</html>
