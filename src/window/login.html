<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in to Capi</title>
    <style>
      :root {
        --purple: #7c5cff;
        --purple-deep: #5b3fd6;
        --ink: #1e1b2e;
        --lav-100: #f1edff;
        --lav-200: #ddd4fb;
        --muted: #6b6580;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #efeaff;
        color: var(--ink);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 28px 26px;
      }
      .logo { display: flex; align-items: center; gap: 9px; margin-bottom: 6px; }
      .logo img { width: 38px; height: 38px; border-radius: 10px; }
      .logo b { font-size: 20px; color: var(--purple-deep); letter-spacing: -0.3px; }
      h1 { font-size: 17px; margin: 14px 0 2px; text-align: center; }
      p.sub { margin: 0 0 18px; color: var(--muted); text-align: center; font-size: 13px; }
      form { width: 100%; }
      label { display: block; font-weight: 600; font-size: 12.5px; margin: 12px 0 5px; }
      input {
        width: 100%;
        padding: 11px 13px;
        border: 1px solid var(--lav-200);
        border-radius: 11px;
        background: #fff;
        font-size: 14px;
        color: var(--ink);
        outline: none;
        transition: border-color .15s, box-shadow .15s;
      }
      input:focus { border-color: var(--purple); box-shadow: 0 0 0 4px rgba(124,92,255,.16); }
      button.primary {
        width: 100%;
        margin-top: 18px;
        padding: 12px;
        border: 0;
        border-radius: 11px;
        background: var(--purple);
        color: #fff;
        font-weight: 700;
        font-size: 14.5px;
        cursor: pointer;
      }
      button.primary:disabled { opacity: .6; cursor: default; }
      button.primary:hover:not(:disabled) { background: var(--purple-deep); }
      .err {
        display: none;
        margin-top: 14px;
        padding: 10px 12px;
        border-radius: 10px;
        background: #fdecec;
        border: 1px solid #f6c9c9;
        color: #b3261e;
        font-size: 12.5px;
        font-weight: 500;
      }
      .err.show { display: block; }
      .links { margin-top: 16px; text-align: center; font-size: 12.5px; color: var(--muted); }
      .links a { color: var(--purple-deep); font-weight: 600; text-decoration: none; cursor: pointer; }
      .links a:hover { text-decoration: underline; }
      .cancel { margin-top: 10px; }
      .cancel a { color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="logo">
      <img src="../../assets/capi-mascote.png" alt="Capi" />
      <b>Capi</b>
    </div>
    <h1>Sign in to use Capi</h1>
    <p class="sub">You get 20 free sends to try it out.</p>

    <form id="form">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@email.com" autocomplete="email" required />

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="your password" autocomplete="current-password" required />

      <button class="primary" id="submit" type="submit">Sign in</button>
      <div class="err" id="err"></div>
    </form>

    <div class="links">
      Don't have an account yet? <a id="signup">Create a free account</a>
    </div>
    <div class="links cancel">
      <a id="cancel">Not now</a>
    </div>

    <script>
      const form = document.getElementById("form");
      const btn = document.getElementById("submit");
      const err = document.getElementById("err");
      function showErr(msg) {
        err.textContent = msg || "Couldn't sign in. Check your details and try again.";
        err.classList.add("show");
      }
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        err.classList.remove("show");
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        if (!email || !password) return;
        btn.disabled = true;
        btn.textContent = "Signing in…";
        try {
          const res = await window.capiLogin.submit(email, password);
          if (res && res.ok) return; // janela fecha pelo main
          showErr(res && res.error);
        } catch (_e) {
          showErr("No connection. Try again.");
        }
        btn.disabled = false;
        btn.textContent = "Sign in";
      });
      document.getElementById("signup").addEventListener("click", () => window.capiLogin.signup());
      document.getElementById("cancel").addEventListener("click", () => window.capiLogin.cancel());
    </script>
  </body>
</html>
